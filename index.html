<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <main class="page">
            <section class="left-cell">
                <section class="inputFrame">
                    <div class="row">
                        <div class="col">
                            <input id="firstName" placeholder="First Name">
                            <input id="age" placeholder="Age">
                        </div>
                        <div class="col">
                            <input id="lastName" placeholder="Last Name">
                            <label>Is Graduated?</label>
                            <input id="isGraduated" type="checkbox">
                        </div>
                    </div>

                    <button onclick="submit()">Submit</button>
                    <button id="updateBtn" onclick="updateUser()">Update</button>  
                </section>
            </section>

            <section class="right-cell">
                <table id="dataTable" class="outputFrame">
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Is Graduated?</th>
                    </tr>
                    <tr id="user0">
                        <td class="tableCol">Mahmoud</td>
                        <td class="tableCol">Fayed</td>
                        <td class="tableCol">19</td>
                        <td class="tableCol">false</td>
                        <td><button onclick="retrieveData(0)">Update</button>
                            <button onclick="deleteUser(0)">Delete</button>
                        </td>
                    </tr>
                </table>
            </section>
        </main>
        <script src="main.js"></script>
    </body>
</html>
